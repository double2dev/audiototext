name: Bug Report
description: Report a bug or issue with the FreeAudioToText web platform
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        *Note: If this is a security vulnerability, please email support@freeaudiototext.com instead of opening an issue.*
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: e.g. The transcription progress bar freezes at 99%...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Upload an audio file of type '...'
        3. Click on '...'
        4. See error
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: What browser and OS are you using?
      placeholder: e.g. Safari 16 on macOS Ventura, Chrome on Windows 11
    validations:
      required: true
